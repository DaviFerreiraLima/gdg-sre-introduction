name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite execução manual

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: cloud-run-demo
  REPOSITORY_NAME: cloud-run-demo-repo # Nome do repositório no Artifact Registry

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Necessário para o Workload Identity Federation OIDC token

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Autentica no GCP usando Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      # Autentica o Docker CLI no Artifact Registry
      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          registry: ${{ env.REGION }}-docker.pkg.dev

      # Constrói a imagem Docker e envia para o Artifact Registry
      - name: Build and Push Container
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # Realiza o deploy da imagem no Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          # Define a variável GENERATE_ERRORS inicialmente como false (pode ser alterada via painel depois)
          env_vars: GENERATE_ERRORS=false
          # Configura para não ser público, usar apenas 1 instância máxima e recursos reduzidos
          flags: --no-allow-unauthenticated --max-instances=1 --cpu=1 --memory=256Mi

